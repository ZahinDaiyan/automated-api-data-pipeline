<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeforces Live Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>Codeforces User Live Tracker</h1>
    <p>This page pulls live data generated by your automated Python backend (`app.py`).</p>
    
    <button onclick="loadDashboardData()">🔄 Refresh Live Logs</button>

    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Username</th>
                <th>Rank</th>
                <th>Rating</th>
                <th>Max Rating</th>
            </tr>
        </thead>
        <tbody id="data-rows">
            </tbody>
    </table>

    <script>
        async function loadDashboardData() {
            try {
                // Fetch the JSON data file that app.py is generating
                const response = await fetch('dashboard_data.json');
                const data = await response.json();
                
                const tableBody = document.getElementById('data-rows');
                tableBody.innerHTML = ''; // Clear old rows

                // Loop through the entries and display them
                data.forEach(entry => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${entry.Timestamp}</td>
                        <td><strong>${entry.Username}</strong></td>
                        <td>${entry.Rank}</td>
                        <td><span style="color: #4caf50;">${entry.Rating}</span></td>
                        <td>${entry['Max Rating']}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.log("Waiting for data file...", error);
            }
        }

        // Load the logs immediately when the web page opens
        loadDashboardData();
    </script>
</body>
</html>
